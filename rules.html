<!DOCTYPE html>
<html>
<head>
    <title>Server Rules</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #1a1a1a; /* Dark background */
            color: white;
            padding-top: 50px;
        }
        .rules-container {
            background-color: #2a2a2a;
            display: inline-block;
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #ff4444;
            text-align: left;
        }
        h1 {
            color: #ff4444;
            text-align: center;
            margin-top: 0;
        }
        .rule-item {
            font-size: 24px;
            margin: 20px 0;
            font-weight: bold;
        }
        .back-button {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            background-color: #444;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
        }
        .back-button:hover {
            background-color: #666;
        }
    </style>
</head>
<body>

    <div class="rules-container">
        <h1>📜 SERVER RULES</h1>
        
        <div class="rule-item">Rule 1: NO FIGHTING</div>
        <div class="rule-item">Rule 2: no Killing</div>
        <div class="rule-item">Rule 3: no helping</div>

        <center>
            <a href="https://github.com/YourUsername" class="back-button">⬅ GO BACK</a>
        </center>
    </div>

</body>
</html>
